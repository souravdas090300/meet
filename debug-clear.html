<!DOCTYPE html>
<html>
<head>
    <title>Debug Clear</title>
</head>
<body>
    <h1>Clearing localStorage and redirecting...</h1>
    <script>
        // Clear all localStorage
        localStorage.clear();
        
        // Log what we're doing
        console.log('LocalStorage cleared');
        
        // Redirect to the app
        setTimeout(() => {
            window.location.href = 'http://localhost:5173';
        }, 1000);
    </script>
</body>
</html>
