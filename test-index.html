<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Worker Test</title>
</head>
<body>
    <h1>Service Worker Test</h1>
    <div id="status"></div>
    <div id="manifest-status"></div>
    
    <script>
        const statusDiv = document.getElementById('status');
        const manifestDiv = document.getElementById('manifest-status');
        
        // Test manifest.json
        fetch('/meet/manifest.json')
            .then(response => {
                if (response.ok) {
                    manifestDiv.innerHTML = '✅ Manifest.json loads successfully';
                    manifestDiv.style.color = 'green';
                } else {
                    manifestDiv.innerHTML = '❌ Manifest.json failed to load: ' + response.status;
                    manifestDiv.style.color = 'red';
                }
            })
            .catch(error => {
                manifestDiv.innerHTML = '❌ Manifest.json error: ' + error.message;
                manifestDiv.style.color = 'red';
            });
        
        // Test service worker registration
        if ('serviceWorker' in navigator) {
            const swUrl = '/meet/service-worker.js';
            navigator.serviceWorker.register(swUrl, { scope: '/meet/' })
                .then(registration => {
                    statusDiv.innerHTML = '✅ Service Worker registered successfully!';
                    statusDiv.style.color = 'green';
                    console.log('Service Worker registered:', registration);
                })
                .catch(error => {
                    statusDiv.innerHTML = '❌ Service Worker registration failed: ' + error.message;
                    statusDiv.style.color = 'red';
                    console.error('Service Worker registration failed:', error);
                });
        } else {
            statusDiv.innerHTML = '❌ Service Workers not supported';
            statusDiv.style.color = 'red';
        }
    </script>
</body>
</html>
